<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindDump - Clear Your Mind</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="globalExitBtn" style="position: fixed; top: 20px; right: 20px; padding: 10px 15px; background: rgba(255,100,100,0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s;" onmouseover="this.style.background='red'" onmouseout="this.style.background='rgba(255,100,100,0.8)'" onclick="window.location.href='index.html'">🚪 Exit / Reset</button>
  <div class="container">
    <h1>🧠 MindDump</h1>
    <p class="tagline">Write it. Dump it. Breathe.</p>
    <p id="motivationalQuote" style="font-style: italic; color: #6c63ff; font-size: 0.95rem; margin-bottom: 15px;"></p>
    
    <!-- Thought input -->
    <textarea id="thoughtInput" placeholder="Write your thoughts here..."></textarea>

    <!-- Emoji Mood Selector -->
    <div id="moodSelector">
      <button class="mood-btn selected" data-mood="rain" title="Rain">🌧️</button>
      <button class="mood-btn" data-mood="fireplace" title="Fireplace">🔥</button>
      <button class="mood-btn" data-mood="forest" title="Forest">🌿</button>
    </div>
    <p id="auraText">Select the aura you want to feel relaxed</p>

    <!-- Dump Button -->
    <button id="dumpBtn">Dump It</button>
    
    <!-- Output After Dump -->
    <div id="output" class="hidden">
      <div id="nlpResultBox" style="background: #f8f9fa; border: 1px solid #ddd; margin-bottom: 15px; padding: 10px; border-radius: 8px;">
         <span style="color: #555; font-size: 0.9rem;">Detected Mood:</span> 
         <span id="nlpMoodBadge" style="font-weight: bold; padding: 3px 8px; border-radius: 12px; font-size: 0.9rem;">---</span>
         <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #777;" id="nlpScoreText"></p>
      </div>
      <div id="breathCircle"></div>
      <p id="breatheText" style="font-size: 1.2rem; color: #007bff;"></p>
      <p class="cleared">Your thoughts have been released. ✨</p>
      <p id="quote"></p>
      <p style="color: white; font-size: 1.2rem; margin-top: 1rem;">Breathe with the circle...</p>
      <button id="exitMainBtn" style="margin-top: 20px; padding: 10px 20px; background-color: rgba(255,255,255,0.2); color: white; border: 1px solid white; border-radius: 20px; cursor: pointer;">Exit</button>
    </div>

    <!-- Mini Body Scan -->
    <div id="bodyScan" class="hidden">
      <p class="cleared" style="margin-bottom: 1rem;">Now, let’s try a short body scan 🧘‍♀️</p>
      <p id="scanText" style="color: white; font-size: 1.2rem;"></p>
    </div>
  </div>

  <!-- Optional YouTube Player (used only for rain/fireplace/forest) -->
  <div id="ytPlayer" style="display: none;">
    <iframe
      id="ytFrame"
      width="0"
      height="0"
      src=""
      frameborder="0"
      allow="autoplay"
    ></iframe>
  </div>
 

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
