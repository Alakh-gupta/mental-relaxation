<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relaxation Session</title>
  <link rel="stylesheet" href="relax.css">
</head>
<body class="relax-bg">
  <button id="globalExitBtn" style="position: fixed; top: 20px; right: 20px; padding: 10px 15px; background: rgba(255,100,100,0.8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s;" onmouseover="this.style.background='red'" onmouseout="this.style.background='rgba(255,100,100,0.8)'" onclick="window.location.href='index.html'">🚪 Exit / Reset</button>
  <!-- Starry Sky Background -->
  <div class="stars" id="starField"></div>

  <!-- Relaxation Container -->
  <div id="relaxContainer" class="relax-container">
    <h2>Mini Body Relaxation</h2>
    <div id="relaxText" class="scan-text"></div>
    <!-- Restart/Exit Buttons -->
    <div id="restartOptions" class="restart-options">
      <button id="startAgainBtn">Start Again</button>
      <button id="exitBtn">Exit</button>
    </div>
  </div>

  <audio id="bgMusic" loop autoplay>
  <source src="https://cdn.pixabay.com/audio/2022/03/30/audio_674c197460.mp3" type="audio/mp3">
  Your browser does not support the audio element.
</audio>

  <!-- JavaScript -->
  <script src="relax.js"></script>
</body>
</html>
